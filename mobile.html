<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vinyl Dashboard Mobile</title>
  <link rel="stylesheet" href="mobile.css" />
</head>
<body>
  <header>
    <h1 class="header-title">Vinyl Vault</h1>
    <div class="top-bar">
      <input type="text" id="search-input" placeholder="Search albums..." />
      <button id="fav-filter-toggle">★</button>
    </div>
    <div class="filters">
      <select id="genre-filter">
        <option value="">All Genres</option>
        <option value="rock">Rock</option>
        <option value="pop">Pop</option>
        <option value="hip-hop">Hip-Hop</option>
        <option value="jazz">Jazz</option>
        <option value="soul">Soul</option>
        <option value="electronic">Electronic</option>
        <option value="classical">Classical</option>
        <option value="funk">Funk</option>
        <option value="folk">Folk</option>
        <option value="metal">Metal</option>
        <option value="rnb">R&B</option>
        <option value="reggae">Reggae</option>
        <option value="punk">Punk</option>
        <option value="blues">Blues</option>
        <option value="experimental">Experimental</option>
      </select>
      <select id="decade-filter">
        <option value="">All Decades</option>
        <option value="1950">1950s</option>
        <option value="1960">1960s</option>
        <option value="1970">1970s</option>
        <option value="1980">1980s</option>
        <option value="1990">1990s</option>
        <option value="2000">2000s</option>
        <option value="2010">2010s</option>
        <option value="2020">2020s</option>
      </select>
    </div>
    <button id="view-toggle">Switch to List View</button>
  </header>

  <main>
    <div id="album-container" class="album-grid"></div>
  </main>

  <script src="mobile.js"></script>
</body>
</html>
