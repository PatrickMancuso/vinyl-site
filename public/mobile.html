<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinyl Mobile</title>
  <link rel="stylesheet" href="mobile.css">
</head>
<body>
  <header class="mobile-header">
    <input type="text" id="search-bar" placeholder="Search albums...">
    <button id="add-btn">＋</button>
  </header>

  <nav class="mobile-nav">
    <button id="carousel-tab" class="active">Carousel</button>
    <button id="list-tab">List</button>
  </nav>

  <main>
    <section id="carousel-view" class="view active">
      <div id="mobile-carousel" class="carousel-container"></div>
      <div class="carousel-controls">
        <button id="mobile-prev">⟨</button>
        <button id="mobile-next">⟩</button>
      </div>
    </section>

    <section id="list-view" class="view">
      <ul id="mobile-album-list"></ul>
    </section>
  </main>

  <script src="mobile.js"></script>
</body>
</html>
