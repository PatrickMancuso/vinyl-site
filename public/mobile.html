<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinyl Mobile</title>
  <link rel="stylesheet" href="mobile.css">
  
  <style>
 .form-container {
  max-width: 500px;
  margin: 40px auto;
  padding: 20px; /* Reduced padding */
  background-color: #1a1a1a;
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(0, 0, 0, 0.6);
  width: 90%; /* Ensures it stretches better on mobile */
}

.dev-message {
  font-size: 1rem;
  line-height: 1.5;
  text-align: center;
  margin: 0;
}

.dev-message a {
  color: #88f;
  text-decoration: underline;
}

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
      margin-left: -5px;
    }
    </style>

</head>
<body>
  <header class="mobile-header">
  <div class="header-top">
    <span class="app-title">Vinyl Vault</span>
  </div>
    
    <div class="form-container">
  <p class="dev-message">
    Integration of the Vinyl Vault for mobile devices is under development. For now enjoy the fully fledged version on Windows/Mac at <a href="https://vinylvault.glitch.me">vinylvault.glitch.me</a>.
  </p>
</div>


  <div class="header-bottom">
    <input type="text" id="search-bar" placeholder="Search albums...">
    <button id="add-btn">＋</button>
  </div>
</header>


  <nav class="mobile-nav">
  </nav>

  <main>
    <section id="carousel-view" class="view active">
      <div id="mobile-carousel" class="carousel-container"></div>
    </section>

    <section id="list-view" class="view">
      <ul id="mobile-album-list"></ul>
    </section>
  </main>

  <script src="mobile.js"></script>
</body>
</html>
