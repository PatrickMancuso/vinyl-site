<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Artist Origins Map</title>
  <link rel="stylesheet" href="map.css" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    #map {
      height: 100vh;
    }
    .popup-content {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .popup-content img {
      height: 60px;
      border-radius: 6px;
    }
    .popup-content .album-info {
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script>
    const map = L.map('map').setView([20, 0], 2); // Centered globally

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors',
    }).addTo(map);

    fetch('records.json')
      .then(res => res.json())
      .then(data => {
        data.forEach(async album => {
          const location = album.artist_origin;
          if (!location) return; // Skip if no origin

          try {
            const geocodeRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(location)}`);
            const geocodeData = await geocodeRes.json();

            if (geocodeData.length > 0) {
              const { lat, lon } = geocodeData[0];
              L.marker([lat, lon]).addTo(map).bindPopup(`
                <div class="popup-content">
                  <img src="${album.cover}" alt="cover" />
                  <div class="album-info">
                    <strong>${album.title}</strong><br/>
                    <em>${album.artist}</em>
                  </div>
                </div>
              `);
            }
          } catch (err) {
            console.error("Geocoding error:", err);
          }
        });
      });
  </script>
</body>
</html>
