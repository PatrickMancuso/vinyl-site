<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://cdn.glitch.global/5a61e06d-3a29-4f64-9308-866c806f9357/vinyl.svg?v=1748371254359" type="image/png" />

  <meta charset="UTF-8" />
  <title>Listening Room</title>
  <link rel="stylesheet" href="room.css" />
  <script type="module" src="/firebase-init.js"></script>
</head>
<body>
  <header class="room-header">
        <div class="header-left">

                <a href="index.html" id="toggle-view" title="Menu">← Back to Carousel</a>
</div>
    <div class="header-title">Listening Station</div>
    <div class="header-right filters-container">
      <input
        type="text"
        id="search-input"
        placeholder="Search by title or artist..."
        autocomplete="off"
      />

      
<select id="genre-select" aria-label="Filter by genre">
        <option value="all">All Genres</option>
        </select>

      <select id="decade-select" aria-label="Filter by decade">
        <option value="all">All Decades</option>
        <!-- decades populated dynamically -->
      </select>
    </div>
  </header>

  <!-- Horizontal scrollable album strip -->
  <div id="album-list" class="album-strip"></div>

  <!-- Two-column main content: info panel on left, player on right -->
  <div id="main-content">
    <aside id="info-panel">
      <p>Select an album to see details.</p>
    </aside>
    <section id="player-area" class="player-display">
      <p>Select an album to listen.</p>
    </section>
  </div>

  <script>
    let albums = [];
    let filteredAlbums = [];

    // Utility to get unique genres and decades
    function getUniqueGenres() {
      const genreSet = new Set();
      albums.forEach(a => {
        if (Array.isArray(a.tags)) {
          a.tags.forEach(tag => genreSet.add(tag.toLowerCase()));
        }
      });
      return [...genreSet].sort();
    }

    function getUniqueDecades() {
      const decadeSet = new Set();
      albums.forEach(a => {
        if (a.year) {
          const decade = Math.floor(a.year / 10) * 10;
          decadeSet.add(decade);
        }
      });
      return [...decadeSet].sort((a,b) => a - b);
    }

    // Populate filters with options
    function populateFilters() {
      const genreSelect = document.getElementById('genre-select');
      const decadeSelect = document.getElementById('decade-select');

      // Clear existing dynamic options (keep "All")
      genreSelect.querySelectorAll('option.dynamic').forEach(opt => opt.remove());
      decadeSelect.querySelectorAll('option.dynamic').forEach(opt => opt.remove());

      getUniqueGenres().forEach(genre => {
        const option = document.createElement('option');
        option.value = genre;
        option.textContent = genre.charAt(0).toUpperCase() + genre.slice(1);
        option.classList.add('dynamic');
        genreSelect.appendChild(option);
      });

      getUniqueDecades().forEach(decade => {
        const option = document.createElement('option');
        option.value = decade;
        option.textContent = decade + 's';
        option.classList.add('dynamic');
        decadeSelect.appendChild(option);
      });
    }

    // Filter albums based on search, genre, decade
    function filterAlbums() {
      const searchText = document.getElementById('search-input').value.toLowerCase();
      const selectedGenre = document.getElementById('genre-select').value.toLowerCase();
      const selectedDecade = document.getElementById('decade-select').value;

      filteredAlbums = albums.filter(album => {
        const matchesSearch =
          album.title.toLowerCase().includes(searchText) ||
          album.artist.toLowerCase().includes(searchText);

        const matchesGenre = selectedGenre === 'all' || 
          (Array.isArray(album.tags) && album.tags.some(t => t.toLowerCase() === selectedGenre));

        const matchesDecade = selectedDecade === 'all' ||
          (album.year && Math.floor(album.year / 10) * 10 == selectedDecade);

        return matchesSearch && matchesGenre && matchesDecade;
      });

      renderAlbumList();
    }

    function renderAlbumList() {
      const list = document.getElementById('album-list');
      list.innerHTML = '';

      if (filteredAlbums.length === 0) {
        list.innerHTML = '<p style="color:#ccc; padding:1rem;">No albums found.</p>';
        return;
      }

      filteredAlbums.forEach(album => {
        const div = document.createElement('div');
        div.className = 'album-thumb';

        div.innerHTML = `
          <img src="${album.cover}" alt="${album.title}" />
          <div class="hover-info">${album.title}<br><span>${album.artist}</span></div>
        `;

        div.addEventListener('click', () => {
          loadPlayer(album);
          loadInfoPanel(album);
        });

        list.appendChild(div);
      });
    }

    document.getElementById('album-list').addEventListener('wheel', function (e) {
      if (e.deltaY !== 0) {
        e.preventDefault();
        this.scrollLeft += e.deltaY;
      }
    }, { passive: false });

    // Event listeners for filters
    document.getElementById('search-input').addEventListener('input', filterAlbums);
    document.getElementById('genre-select').addEventListener('change', filterAlbums);
    document.getElementById('decade-select').addEventListener('change', filterAlbums);

    function loadPlayer(album) {
      const playerArea = document.getElementById('player-area');
      playerArea.innerHTML = `
        <img src="${album.cover}" alt="${album.title}" />
        <iframe 
          src="${album.spotify_url}" 
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
          loading="lazy">
        </iframe>
      `;
    }

    function loadInfoPanel(album) {
      const infoPanel = document.getElementById('info-panel');
      infoPanel.innerHTML = `
        <h2>${album.title}</h2>
        <h3>${album.artist} (${album.year})</h3>
        <p>Loading artist info...</p>
      `;

      const apiKey = "e530c016b028fa384b92183344f7526e";
      fetch(`https://ws.audioscrobbler.com/2.0/?method=artist.getinfo&artist=${encodeURIComponent(album.api_artist_name || album.artist)}&api_key=${apiKey}&format=json`)
        .then(res => res.json())
        .then(data => {
          const bio = data.artist?.bio?.summary || 'No bio available.';
          const tags = data.artist?.tags?.tag.map(t => t.name).join(', ') || 'No tags.';
          infoPanel.innerHTML = `
            <h2>${album.title}</h2>
            <h3>${album.artist} (${album.year})</h3>
            <p>${bio}</p>
            <p><strong>Tags:</strong> ${tags}</p>
          `;
        });
    }

    // Load albums on page load
    fetch('records.json')
      .then(res => res.json())
      .then(data => {
        albums = data.sort((a, b) => a.artist.localeCompare(b.artist));
        filteredAlbums = albums;

        populateFilters();
        renderAlbumList();
      });
  </script>
</body>
</html>
