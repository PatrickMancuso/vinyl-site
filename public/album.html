<!DOCTYPE html>
<html lang="en">
        <link rel="icon" href="/assets/vinyl.svg" type="image/png" />


  <script type="module" src="/firebase-init.js"></script>

  
<head>
  <meta charset="UTF-8" />
  <title>Album Details</title>
  <style>

  
html {
  scrollbar-width: none; /* Firefox */
  -ms-overflow-style: none; /* IE 10+ */
  overflow-y: scroll; /* Still allows scrolling */
}

html::-webkit-scrollbar {
  display: none; /* Chrome, Safari */
}


/* Global body styles */
body {
  margin: 0;
  height: 100%;
  font-family: 'Garamond', serif;
  background: url('/assets/record+black+background.png') no-repeat center center fixed;
  background-size: cover;
  color: #fff;

  /* Scrollbar hiding styles */
  -ms-overflow-style: none;  /* IE/Edge */
  scrollbar-width: none;     /* Firefox */
  overflow-x: hidden;        /* Hide horizontal */
}

/* Hide scrollbar on WebKit (Chrome, Safari) */
body::-webkit-scrollbar {
  display: none;
}

    .header-title {
  font-family: 'HooeyDemo', serif;
  font-size: 3rem;
  margin: 0;
  white-space: nowrap;
  font-weight: normal;
  text-align: center;
  user-select: none;
}

    .detail-container {
  position: relative; /* Needed for absolute children */
  max-width: 1200px;
  margin: 40px auto;
  padding: 20px;
  background-color: #1a1a1a;
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(0, 0, 0, 0.6);
}

.top-right {
  position: absolute;
  top: 20px;
  right: 20px;
}
    .detail-container img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    
    #delete-btn {
  background-color: red;
  color: white;
  padding: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: background-color 0.3s ease;
}

#delete-btn:hover {
  background-color: darkred;
}
 
    #edit-btn {
      background-color: #007BFF; /* blue */
      color: white;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      margin-right: 10px;
    }

    #edit-btn:hover {
      background-color: #0056b3;
    }

.back-link {
  color: #ccc !important;  
  text-decoration: none;
  margin-bottom: 20px;
  display: inline-block;
}

.back-link:hover {
  color: #8B0000; /* Dark red color */
  text-decoration: underline;
}
    #artist-info {
      margin-top: 30px;
      font-size: 0.95rem;
      line-height: 1.5;
      color: #eee;
    }
    
    
    .album-flex {
  display: flex;
  flex-direction: row;
  gap: 40px;
  margin-top: 20px;
}

.album-left {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.album-left img {
  width: 100%;
  max-width: 100%;
  border-radius: 10px;
  object-fit: contain;
}
    
    .cover-and-title {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.album-title {
  margin-top: 12px;
  font-size: 2rem;
  color: #fff;
  text-align: center;
}
    
    .album-meta {
  font-size: 1.3rem;
  color: #ccc;
  text-align: center;
  margin-top: 8px;
}


.album-right {
  flex: 1;
  color: #fff;
  overflow-y: auto;
}

.spotify-embed {
  width: 100%;
  height: 420px;
  border-radius: 12px;
  margin: 40px 0;
}
    
    #toggle-view {
  background: rgba(0, 0, 0, 0.7);
  color: white;
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 9px 15px;
  font-size: 1.1rem;
  text-align: center;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  width: auto;
  min-width: 80px;
    transition: background 0.3s ease, color 0.3s ease;  

}

#toggle-view:hover {
  background: rgba(255, 255, 255, 0.4);
}
    
    
    #edit-form label {
      display: block;
      margin-bottom: 12px;
      color: #ccc;
    }

    #edit-form input {
      width: 100%;
      padding: 6px 8px;
      margin-top: 4px;
      background: #333;
      color: #fff;
      border: 1px solid #666;
      border-radius: 4px;
    }

    #edit-form button {
      background-color: #0066cc;
      color: white;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    #edit-form button:hover {
      background-color: #004999;
    }
    
  </style>
</head>
<body>
  

  
  <div class="detail-container" id="album-container">
    
    
    <p>Loading album...</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const albumId = params.get('id');

    fetch('records.json')
      .then(res => res.json())
      .then(data => {
        const album = data.find(a => a.id === albumId);
        if (!album) {
          document.getElementById('album-container').innerHTML = '<p>Album not found.</p>';
          return;
        }

        document.getElementById('album-container').innerHTML = `
          <a href="index.html" id="toggle-view">← Back to Carousel</a>
          <div class="top-right">
            <button id="edit-btn" class="edit-btn">Edit Album</button>
            <button id="delete-btn" onclick="deleteAlbum('${album.id}')">Delete Album</button>
          </div>
          <div class="album-flex">
            <div class="album-left">
              <div class="cover-and-title">
                <img src="${album.cover}" alt="${album.title} album cover">
                <h2 class="album-title">${album.title}</h2>
                <h3 class="album-meta">${album.artist} (${album.year})</h3>
              </div>
            </div>
            <div class="album-right">

              ${album.spotify_url ? `
                <iframe class="spotify-embed" src="${album.spotify_url}" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>
              ` : ''}

              <form id="edit-form" style="display: none; margin-top: 20px;">
                <label>Title: <input type="text" id="edit-title" value="${album.title}" /></label><br>
                <label>Artist: <input type="text" id="edit-artist" value="${album.artist}" /></label><br>
                <label>Year: <input type="number" id="edit-year" value="${album.year}" /></label><br>
                <label>Cover URL: <input type="text" id="edit-cover" value="${album.cover}" /></label><br>
                <label>Spotify URL: <input type="text" id="edit-spotify" value="${album.spotify_url || ''}" /></label><br>
                <label>Tags: <input type="text" id="edit-tags" value="${album.tags || ''}" /></label><br>
                <label>Origin: <input type="text" id="edit-origin" value="${album.artist_origin || ''}" /></label><br>
                <button type="button" onclick="saveChanges('${album.id}')">Save Changes</button>
              </form>

              <div id="artist-info"><p>Loading artist info...</p></div>
            </div>
          </div>
        `;

        // Attach edit button functionality AFTER content is loaded
        document.getElementById('edit-btn').addEventListener('click', () => {
          const form = document.getElementById('edit-form');
          form.style.display = form.style.display === 'none' ? 'block' : 'none';
        });

        // Load artist info from Last.fm
        const apiKey = "e530c016b028fa384b92183344f7526e";
        fetch(`https://ws.audioscrobbler.com/2.0/?method=artist.getinfo&artist=${encodeURIComponent(album.api_artist_name)}&api_key=${apiKey}&format=json`)
          .then(res => res.json())
          .then(data => {
            const bio = data.artist?.bio?.summary || '';
            const tags = data.artist?.tags?.tag.map(t => t.name).join(', ') || '';
            document.getElementById('artist-info').innerHTML = `
              <h4>About ${album.artist}</h4>
              <p>${bio}</p>
              <p><strong>Tags:</strong> ${tags}</p>
            `;
          });
      })
      .catch(err => {
        document.getElementById('album-container').innerHTML = '<p>Error loading album.</p>';
      });

    function deleteAlbum(id) {
      if (!confirm("Are you sure you want to delete this album?")) return;

      fetch(`/delete-album/${id}`, {
        method: "DELETE"
      })
        .then(res => {
          if (res.ok) {
            alert("Album deleted!");
            window.location.href = "/";
          } else {
            alert("Failed to delete album.");
          }
        })
        .catch(err => {
          console.error(err);
          alert("Error deleting album.");
        });
    }

    function saveChanges(albumId) {
      const updated = {
        title: document.getElementById("edit-title").value.trim(),
        artist: document.getElementById("edit-artist").value.trim(),
        year: parseInt(document.getElementById("edit-year").value),
        cover: document.getElementById("edit-cover").value.trim(),
        tags: document.getElementById("edit-tags").value.split(",").map(tag => tag.trim()),
        spotify_url: document.getElementById("edit-spotify").value.trim(),
        artist_origin: document.getElementById("edit-origin").value.trim()
      };

      if (!updated.title || !updated.artist || isNaN(updated.year)) {
        alert("Title, artist, and year are required.");
        return;
      }

      fetch(`/api/records/${albumId}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(updated)
      }).then(res => {
        if (res.ok) {
          alert("Album updated successfully!");
          document.getElementById('edit-form').style.display = 'none';
          location.reload();
        } else {
          alert("Failed to update album.");
        }
      });
    }
  </script>



</body>
</html>
