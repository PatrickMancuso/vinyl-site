<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://cdn.glitch.global/5a61e06d-3a29-4f64-9308-866c806f9357/vinyl.svg?v=1748371254359" type="image/png" />

  <meta charset="UTF-8" />
  <title>Contact | Vinyl Vault</title>
  <style>
    body {
      margin: 0;
      font-family: 'Garamond', monospace;
      background: linear-gradient(to bottom right, #0f0f0f, #1a1a1a);
      color: #eee;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background-color: #111;
      padding: 20px 40px;
      font-size: 1.8rem;
      text-align: center;
      color: #f1c40f;
      letter-spacing: 2px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }

    main {
      flex: 1;
      max-width: 950px;
      margin: 50px auto;
      padding: 0 30px;
    }

    h2 {
      color: #f1c40f;
      border-bottom: 1px solid #444;
      padding-bottom: 5px;
      margin-bottom: 15px;
      font-size: 1.4rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    label {
      font-size: 1rem;
      margin-bottom: 4px;
    }

    input, textarea {
      padding: 10px;
      font-family: 'Garamond', monospace;
      font-size: 1rem;
      background-color: #222;
      color: #eee;
      border: 1px solid #444;
      border-radius: 4px;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #f1c40f;
    }

    button {
      background-color: #f1c40f;
      color: #111;
      font-family: 'Garamond', monospace;
      font-size: 1rem;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      align-self: flex-start;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #e0b400;
    }

    .info {
      margin-top: 30px;
      font-size: 0.95rem;
      color: #cf1c40f;
    }

    footer {
      background-color: #111;
      color: #999;
      text-align: center;
      padding: 15px;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      main {
        padding: 0 15px;
      }
    }
  </style>
</head>
<body>

<header>Contact Vinyl Vault</header>

<main>
  <section>
          <a href="index.html" id="toggle-view">← Back to Carousel</a>

    <h2>Drop Us a Line</h2>
    <p>Got feedback, ideas, or just want to say hey? Use the form below or reach out directly.</p>
    
    <form action="mailto:youremail@example.com" method="POST" enctype="text/plain">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required />

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit">Send Message</button>
    </form>

    <div class="info">
      Prefer email? Reach out at <a href="mailto:pama1549@colroado.edu">pama1549@colorado.edu</a><br>
      We'll get back to you within 1–2 business days.
    </div>
  </section>
</main>

<footer>
  © 2025 Vinyl Vault — Curated with love & records
</footer>

</body>
</html>
