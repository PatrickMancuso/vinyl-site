<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Now Spinning</title>
  <link rel="stylesheet" href="spinning.css" />
</head>
<body>
  <header>
    <h1 class="header-title">Now Spinning</h1>
  </header>

  <main class="now-spinning-layout">
    <div class="info-column">
      <h2 id="album-title">Loading...</h2>
      <p id="album-artist"></p>
      <div id="artist-info"><p>Loading artist info...</p></div>
      <iframe id="spotify-embed" class="spotify-embed" allow="encrypted-media"></iframe>
    </div>

    <div class="vinyl-column">
      <div class="vinyl-wrapper">
        <div class="vinyl">
          <img id="album-cover" src="" alt="Album Cover">
        </div>
      </div>
    </div>
  </main>

  <div class="bookshelf"></div>

  <script src="spinning.js"></script>
</body>
</html>
