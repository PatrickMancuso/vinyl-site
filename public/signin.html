<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In - Vinyl Vault</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex; 
      height: 100vh; 
      justify-content: center; 
      align-items: center; 
      background: #222;
      color: #eee;
      margin: 0;
    }
    .container {
      text-align: center;
      background: #333;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 0 10px #000;
    }
    button {
      font-size: 1.2rem;
      padding: 0.8rem 2rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background-color: #4285F4;
      color: white;
      margin-top: 1rem;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #357ae8;
    }
    #error-message {
      color: #f44336;
      margin-top: 1rem;
      min-height: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Sign In to Vinyl Vault</h1>
    <button id="google-signin">Sign in with Google</button>
    <div id="error-message"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    // Your Firebase config object (replace with your actual config)
    const firebaseConfig = {
  apiKey: "AIzaSyBZ8WPbtbDoVEc-mW7v0o53SaHmkEhYi2o",
  authDomain: "vinylvault-edb5d.firebaseapp.com",
  projectId: "vinylvault-edb5d",
  storageBucket: "vinylvault-edb5d.appspot.com",
  messagingSenderId: "765908668046",
  appId: "1:765908668046:web:82b9bfc19ab4a2f031c3df"
};

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const signInButton = document.getElementById("google-signin");
    const errorMessage = document.getElementById("error-message");

    signInButton.addEventListener("click", () => {
      signInWithPopup(auth, provider)
        .then((result) => {
          // Signed in successfully
          window.location.href = "list.html"; // redirect to your list page or homepage
        })
        .catch((error) => {
          errorMessage.textContent = "Sign in failed: " + error.message;
        });
    });

    // If user is already signed in, redirect automatically
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "index.html";
      }
    });
  </script>
</body>
</html>
