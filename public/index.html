<!DOCTYPE html>
<html lang="en" style="height: 100vh; width: 100vw;">
<head>
  <meta charset="UTF-8" />
  <title>Vinyl Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  
  <script>
  if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
    window.location.href = "mobile.html";
  }
</script>
  
</head>
<body style="height: 100%; width: 100%; display: flex; flex-direction: column;">
<header>
  <div class="header-left">
    <input type="text" id="search-input" placeholder="Search by title or artist...">
    <button id="fav-filter-toggle" title="Show Favorites">⭐</button>
    <a href="list.html" id="toggle-view">List</a>
  </div>

  <div class="header-title">Vinyl Dashboard</div>

  <div class="header-right">
        <a href="add.html" id="add-album">New Album</a>


    <div class="filter-group">
      <select id="genre-select">
        <option value="all">All Genres</option>
        <option value="rock">Rock</option>
        <option value="funk">Funk</option>
        <option value="soul">Soul</option>
        <option value="rnb">R&B</option>
        <option value="jazz">Jazz</option>
        <option value="jazz fusion">Jazz Fusion</option>
        <option value="electronic">Electronic</option>
        <option value="ambient">Ambient</option>
        <option value="psychedelic">Psychedelic</option>
        <option value="progressive rock">Progressive Rock</option>
        <option value="new wave">New Wave</option>
        <option value="pop">Pop</option>
        <option value="disco">Disco</option>
        <option value="blues">Blues</option>
        <option value="folk">Folk</option>
        <option value="reggae">Reggae</option>
        <option value="soundtrack">Soundtrack</option>
        <option value="instrumental">Instrumental</option>
        <option value="japanese">Japanese</option>
      </select>

      <select id="decade-select">
        <option value="all">All Decades</option>
        <option value="1950">1950s</option>
        <option value="1960">1960s</option>
        <option value="1970">1970s</option>
        <option value="1980">1980s</option>
        <option value="1990">1990s</option>
        <option value="2000">2000s</option>
        <option value="2010">2010s</option>
        <option value="2020">2020s</option>
      </select>
    </div>

  </div>
</header>

<!-- Carousel View -->
<div id="carousel-view" style="width: 100%; height: calc(100% - 79px - 97px); display: flex; flex-direction: column; justify-content: center; align-items: center;">   
  <div class="carousel" id="carousel"></div>
</div>

<!-- Nav and Dice Controls -->
<div class="nav-controls">
  <button class="nav-btn" id="prevBtn">&#10094;</button>
  <button class="nav-btn" id="nextBtn">&#10095;</button>
  <button id="randomBtn">🎲</button>
</div>

<div class="bookshelf"></div>

<script src="script.js"></script>
</body>
</html>
