<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add New Album</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .form-container {
      max-width: 600px;
      margin: 40px auto;
      padding: 50px;
      background-color: #1a1a1a;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.6);
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
       margin-left: -5px;
     
    }
    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: none;
       margin-left: -10px;
    }
    button {
      margin-top: 20px;
      background-color: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-left: 2px;
    }
    button:hover {
      background-color: #2563eb;
    }
    #result {
      margin-top: 20px;
      color: #ccc;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <header>Add a New Album</header>
  <div class="form-container">
    <label for="title">Album Title</label>
    <input type="text" id="title" required>

    <label for="artist">Artist Name</label>
    <input type="text" id="artist" required>

    <label for="year">Release Year</label>
    <input type="number" id="year" required>

    <label for="image">Cover Image URL</label>
    <input type="text" id="image" required>
    
    <label for="spotify">Spotify Album URL</label>
    <input type="text" id="spotify" placeholder="https://open.spotify.com/album/..." />

    <button onclick="generateEntry()">Generate Album JSON</button>
    <button onclick="submitAlbum()">Save Album to Dashboard</button>


    <pre id="result"></pre>
  </div>

  <script>
    const apiKey = "e530c016b028fa384b92183344f7526e"; // Last.fm API key

    async function fetchArtistInfo(artistName) {
      const response = await fetch(`https://ws.audioscrobbler.com/2.0/?method=artist.getinfo&artist=${encodeURIComponent(artistName)}&api_key=${apiKey}&format=json`);
      const data = await response.json();
      return {
        bio: data.artist?.bio?.summary || "",
        tags: data.artist?.tags?.tag.map(t => t.name).join(", ") || ""
      };
    }

    async function generateEntry() {
      const title = document.getElementById('title').value;
      const artist = document.getElementById('artist').value;
      const year = document.getElementById('year').value;
      const image = document.getElementById('image').value;
      const spotify_url = document.getElementById('spotify').value;


      const id = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
      const info = await fetchArtistInfo(artist);

      const entry = {
        id: id,
        title: title,
        artist: artist,
        year: parseInt(year),
        cover: image,
        api_artist_name: artist,
        tags: info.tags,
        spotify_url: spotify_url
      };

      document.getElementById('result').textContent = JSON.stringify(entry, null, 2);
    }
  </script>
  
  <script>
  async function submitAlbum() {
    const result = document.getElementById('result').textContent;
    if (!result) {
      alert("Please generate the album entry first!");
      return;
    }

    try {
      const response = await fetch("/add-album", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: result,
      });

      if (response.ok) {
        alert("Album added successfully!");
        document.getElementById("title").value = "";
        document.getElementById("artist").value = "";
        document.getElementById("year").value = "";
        document.getElementById("image").value = "";
        document.getElementById("spotify").value = "";
        document.getElementById("result").textContent = "";
      } else {
        alert("Failed to save album.");
      }
    } catch (err) {
      console.error(err);
      alert("Error submitting album.");
    }
  }
</script>

</body>
</html>
