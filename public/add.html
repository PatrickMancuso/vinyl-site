<!DOCTYPE html>
<html lang="en">
  
  <script type="module" src="server.js"></script>

  
<head>
  <meta charset="UTF-8" />
  <title>Add New Album</title>
  <link rel="icon" href="/assets/vinyl.svg" type="image/png" />

  <link rel="stylesheet" href="add.css">
  <style>
    .form-container {
      max-width: 600px;
      margin: 40px auto;
      padding: 70px;
      background-color: rgba(0, 0, 0, 0.8); /* semi-transparent black */
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.6);
      
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
      margin-left: -5px;
    }
    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: none;
      margin-left: -10px;
    }
    button {
      margin-top: 40px;
      background-color: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-left: 2px;
    }
    button:hover {
      background-color: #2563eb;
    }
    #result {
      margin-top: 20px;
      color: #ccc;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <a href="index.html" id="toggle-view">← Back to Carousel</a>
    </div>
    <div class="header-title">Add a New Album</div>
    <div class="header-right">
      <a href="https://open.spotify.com/playlist/3KBRKLF4VzVYXQcR6a7RET?si=8640f7135d7a4a4e" target="_blank" rel="noopener" title="Currently Spinning">
        <img src="/assets/vinyl.svg" alt="Logo" class="header-logo" />
      </a>
    </div>
  </header>

  <div class="form-container">
    <!-- Step 1: Choose Mode -->
    <div id="mode-choice">
      <h2>Choose How to Add Album</h2>
      <button id="manual-btn">Manual Entry (Precise)</button>
      <button id="auto-btn">Automatic Entry (Fast)</button>
    </div>

    <!-- Manual Form -->
    <div id="manual-form" style="display:none;">
      <label for="title">Album Title</label>
      <input type="text" id="title" required>

      <label for="artist">Artist Name</label>
      <input type="text" id="artist" required>

      <label for="year">Release Year</label>
      <input type="number" id="year" required>

      <label for="image">Cover Image URL</label>
      <input type="text" id="image" required>

      <label for="spotify">Spotify Album URL (Optional)
        
        <input type="text" id="spotify" placeholder="https://open.spotify.com/album/..." />

      <label for="origin">Artist Origin (Optional)</label>
      <input type="text" id="origin" placeholder="e.g., London, UK or Detroit, USA" />

      <button onclick="generateEntry()">Generate Album Entry</button>
      <button onclick="submitAlbum()">Save Album to Dashboard</button>
      <pre id="result"></pre>
    </div>

    <!-- Automatic Form -->
    <div id="auto-form" style="display:none;">
      <label for="auto-artist">Artist Name</label>
      <input type="text" id="auto-artist" required>

      <label for="auto-title">Album Name</label>
      <input type="text" id="auto-title" required>

      <button onclick="fetchAutoAlbum()">Fetch Album Info</button>

      <!-- Display fetched info -->
    <div id="auto-result" style="margin-top:20px;"></div>
    </div>
  </div>

  <script>
    const apiKey = "e530c016b028fa384b92183344f7526e";

    // ----- Mode Switching -----
    const manualBtn = document.getElementById("manual-btn");
    const autoBtn = document.getElementById("auto-btn");
    const manualForm = document.getElementById("manual-form");
    const autoForm = document.getElementById("auto-form");
    const modeChoice = document.getElementById("mode-choice");

    manualBtn.onclick = () => {
      modeChoice.style.display = "none";
      manualForm.style.display = "block";
    };
    autoBtn.onclick = () => {
      modeChoice.style.display = "none";
      autoForm.style.display = "block";
    };

    // ----- Manual Entry Functions -----
    async function fetchArtistInfo(artistName) {
      const response = await fetch(`https://ws.audioscrobbler.com/2.0/?method=artist.getinfo&artist=${encodeURIComponent(artistName)}&api_key=${apiKey}&format=json`);
      const data = await response.json();
      return {
        bio: data.artist?.bio?.summary || "",
        tags: data.artist?.tags?.tag.map(t => t.name).join(", ") || ""
      };
    }

    async function generateEntry() {
      const title = document.getElementById('title').value;
      const artist = document.getElementById('artist').value;
      const year = document.getElementById('year').value;
      const image = document.getElementById('image').value;
      const spotifyInput = document.getElementById('spotify').value.trim();
      const origin = document.getElementById('origin').value.trim();

      // --- Clean up Spotify input ---
      let spotify_url = "";
      if (spotifyInput.includes("<iframe")) {
        // Extract src from iframe
        const match = spotifyInput.match(/src="([^"]+)"/);
        if (match && match[1]) {
          spotify_url = match[1];
        }
      } else if (spotifyInput.includes("open.spotify.com/album/") && !spotifyInput.includes("/embed/")) {
        // Convert normal album link to embed format
        spotify_url = spotifyInput.replace("open.spotify.com/album/", "open.spotify.com/embed/album/");
      } else {
        // Already embed link or empty
        spotify_url = spotifyInput;
      }

      const id = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
      const info = await fetchArtistInfo(artist);

      const entry = {
        id: id,
        title: title,
        artist: artist,
        year: parseInt(year),
        cover: image,
        api_artist_name: artist,
        tags: info.tags,
        spotify_url: spotify_url
      };

      if (origin) entry.artist_origin = origin;

      document.getElementById('result').textContent = JSON.stringify(entry, null, 2);
    }

    async function submitAlbum(isAuto = false) {
      const resultEl = isAuto ? document.getElementById('auto-json') : document.getElementById('result');
      if (!resultEl || !resultEl.textContent) {
        alert("Please generate the album entry first!");
        return;
      }

      try {
        const albumEntry = JSON.parse(resultEl.textContent);
        const response = await fetch('/add-album', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(albumEntry)
        });

        if (response.ok) {
          alert('Album saved successfully!');
          resultEl.textContent = '';
          if (isAuto) document.getElementById('auto-result').innerHTML = '';
        } else {
          const errorText = await response.text();
          alert('Failed to save album: ' + errorText);
        }
      } catch (err) {
        alert('Error submitting album: ' + err.message);
      }
    }


    // ----- Automatic Entry -----
    async function fetchAutoAlbum() {
      const artist = document.getElementById('auto-artist').value.trim();
      const albumName = document.getElementById('auto-title').value.trim();

      if (!artist || !albumName) {
        alert("Please enter both artist and album name");
        return;
      }

      const url = `https://ws.audioscrobbler.com/2.0/?method=album.getinfo&artist=${encodeURIComponent(artist)}&album=${encodeURIComponent(albumName)}&api_key=${apiKey}&format=json`;

      try {
        const res = await fetch(url);
        const data = await res.json();

        if (data.error) {
          document.getElementById('auto-result').innerHTML = `<p style="color:red;">Album not found on Last.fm</p>`;
          return;
        }

        const album = data.album;
        const image = album.image?.[3]?.['#text'] || album.image?.[2]?.['#text'] || "img/placeholder.webp";
        const year = album.wiki?.published ? new Date(album.wiki.published).getFullYear() : null;
        const tags = album.tags?.tag.map(t => t.name).join(", ") || "";

        const id = albumName.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');

        const entry = {
          id: id,
          title: album.name || albumName,
          artist: album.artist || artist,
          year: year || 0,
          cover: image,
          api_artist_name: album.artist || artist,
          tags: tags
        };

        document.getElementById('auto-result').innerHTML = `
          <pre id="auto-json">${JSON.stringify(entry, null, 2)}</pre>
          <button onclick="submitAlbum(true)">Save Album to Dashboard</button>
        `;
      } catch (err) {
        console.error(err);
        document.getElementById('auto-result').innerHTML = `<p style="color:red;">Error fetching album info</p>`;
      }
    }
  </script>
</body>
